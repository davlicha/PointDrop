version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pointdrop_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pointdrop_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pointdrop_pgadmin
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pointdrop_network

volumes:
  postgres_data:

networks:
  pointdrop_network:
    driver: bridge