version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pointdrop_db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pointdrop_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pointdrop_pgadmin
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pointdrop_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pointdrop_backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pointdrop_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pointdrop_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - pointdrop_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  pointdrop_network:
    driver: bridge
